<!DOCTYPE html>
<html>
<head>
    <title>SKILLITE AI Mentor</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f172a;
            display: flex;
            flex-direction: column;
            height: 100vh;
            color: white;
        }

        header {
            padding: 15px;
            background: #111827;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
        }

        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        .message {
            max-width: 75%;
            padding: 12px 15px;
            margin: 8px 0;
            border-radius: 12px;
            white-space: pre-wrap;
            line-height: 1.4;
            animation: fadeIn 0.2s ease-in-out;
        }

        .user {
            background: #22c55e;
            align-self: flex-end;
            color: black;
        }

        .ai {
            background: #1e293b;
            align-self: flex-start;
        }

        #input-area {
            display: flex;
            padding: 15px;
            background: #111827;
        }

        #message {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            border: none;
            outline: none;
        }

        button {
            margin-left: 10px;
            padding: 10px 18px;
            background: #22c55e;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            opacity: 0.9;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

<body>

<header>🚀 SKILLITE AI Career Mentor</header>

<div id="chat-container"></div>

<div id="input-area">
    <input type="text" id="message" placeholder="Type your message..." />
    <button onclick="sendMessage()">Send</button>
</div>

<script>

let session_id = localStorage.getItem("session_id");

if (!session_id) {
    session_id = Date.now().toString();
    localStorage.setItem("session_id", session_id);
}

function addMessage(content, type) {
    const chatContainer = document.getElementById("chat-container");

    const messageDiv = document.createElement("div");
    messageDiv.classList.add("message", type);
    messageDiv.textContent = content;

    chatContainer.appendChild(messageDiv);
    chatContainer.scrollTop = chatContainer.scrollHeight;
}

async function sendMessage(initialMessage = null) {

    const input = document.getElementById("message");
    const message = initialMessage ? initialMessage : input.value.trim();
    if (!message) return;

    if (!initialMessage) {
        addMessage(message, "user");
        input.value = "";
    }

    const typingDiv = document.createElement("div");
    typingDiv.classList.add("message", "ai");
    typingDiv.textContent = "Typing...";
    document.getElementById("chat-container").appendChild(typingDiv);

    const res = await fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            message: message,
            session_id: session_id
        })
    });

    const data = await res.json();

    document.getElementById("chat-container").removeChild(typingDiv);

    addMessage(data.reply, "ai");
}

// Enter key support
document.getElementById("message").addEventListener("keypress", function (e) {
    if (e.key === "Enter") {
        e.preventDefault();
        sendMessage();
    }
});

// AUTO GREETING FROM BACKEND
window.onload = function () {
    sendMessage("hi");
};

</script>

</body>
</html>
